<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카디안(Cardian) - AI 자동차 이상 진단 판독기</title>
    <style>
        /* 미래지향적인 사이버 정비소 다크모드 스타일링 */
        body {
            background-color: #1e272e;
            color: #d2dae2;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: #2f3640;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #485460;
        }
        h1 {
            color: #00d2d3;
            text-align: center;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 800;
        }
        .subtitle {
            text-align: center;
            color: #9c88ff;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .upload-box {
            border: 2px dashed #00d2d3;
            padding: 40px 20px;
            text-align: center;
            border-radius: 12px;
            background: #353b48;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        .upload-box:hover {
            border-color: #1dd1a1;
            background: #414b5c;
        }
        #preview-img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 8px;
            display: none;
            margin: 20px auto 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #485460;
        }
        #result-box {
            background: #1e2124;
            padding: 25px;
            border-radius: 10px;
            min-height: 120px;
            font-size: 16px;
            line-height: 1.8;
            border-left: 5px solid #00d2d3;
            margin-bottom: 25px;
            color: #f5f6fa;
            white-space: pre-wrap;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #00d2d3;
            color: #1e272e;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1dd1a1;
            color: white;
        }
        .status-bar {
            font-size: 12px;
            color: #718093;
            text-align: right;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CARDIAN</h1>
    <div class="subtitle">AI 자동차 이상 진단 판독 스캐너 시스템</div>
    
    <div class="upload-box" onclick="document.getElementById('car-file').click()">
        <span id="upload-hint">📸 클릭하여 진단할 차량 사진(계기판 경고등, 타이어, 엔진룸 등)을 업로드하세요</span>
        <input type="file" id="car-file" accept="image/*" style="display: none;" onchange="loadAndConvertImage(this)">
        <img id="preview-img" alt="차량 진단 이미지 미리보기">
    </div>

    <div id="result-box">차량 상태 사진을 업로드한 후 아래 '스마트 AI 진단 시작' 버튼을 눌러주세요. 판독 리포트가 명장의 오디오 가이드와 함께 실시간으로 생성됩니다.</div>

    <button id="btn-scan" onclick="startCarDiagnosis()">🔍 스마트 AI 진단 시작</button>
    
    <div class="status-bar">Powered by OpenAI GPT-4o-mini Vision & Cardian TTS Engine</div>
</div>

<script>
    // ==========================================
    // 🔑 [보안] 문석님의 진짜 새 API 키를 아래에 넣어주세요!
    // ==========================================
    const OPENAI_API_KEY = "여기에_새로_발급받은_보안_키_입력";

    let base64CarImage = ""; 

    // 이미지를 가상 파일 데이터로 변환해 미리보기를 띄우는 프론트엔드 핵심 로직
    function loadAndConvertImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgDisplay = document.getElementById("preview-img");
                imgDisplay.src = e.target.result;
                imgDisplay.style.display = "block";
                document.getElementById("upload-hint").innerText = "🔄 다른 사진으로 교체하기";

                // OpenAI API 전송용 base64 인코딩 스트링 추출
                base64CarImage = e.target.result.split(",")[1];
            };
            reader.readAsDataURL(file);
        }
    }

    // OpenAI 멀티모달 비전 API 호출 함수
    async function startCarDiagnosis() {
        if (!base64CarImage) {
            alert("진단할 자동차 사진을 먼저 업로드해 주세요! 🚗");
            return;
        }

        if (OPENAI_API_KEY.includes("입력")) {
            document.getElementById("result-box").innerText = "🚨 시스템 오류: 코드 92번째 줄에 진짜 API 키를 채워 넣으셔야 카디안 엔진이 작동합니다!";
            return;
        }

        document.getElementById("result-box").innerText = "⚙️ 카디안 스캐너 가동 중... 비전 AI 기술로 사진 속 이상 징후를 추적하고 있습니다.";
        const url = "https://api.openai.com/v1/chat/completions";

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", 
                    messages: [
                        {
                            role: "user",
                            content: [
                                {
                                    type: "text",
                                    text: "너는 20년 경력의 베테랑 자동차 정비 명장이야. 첨부된 사진 속 차량의 상태(계기판 경고등 종류, 타이어 상태, 엔진룸 등)를 면밀히 판독해 줘. 그리고 운전자가 안심할 수 있도록 아래 [출력 규격]에 맞춰서 신뢰감 있게 딱 3문장으로 브리핑해 줘.\n\n[출력 규격]\n1줄: 판독된 증상 이름 및 위험도 수치 (예: 엔진오일 압력 경고등 감지 / [🚨 긴급])\n2줄: 이 증상이 발생한 구체적이고 기계적인 원인 설명\n3줄: 지금 운전자가 당장 취해야 할 안전한 대처법 및 정비소 방문 권장 내용"
                                },
                                {
                                    type: "image_url",
                                    image_url: {
                                        url: `data:image/jpeg;base64,${base64CarImage}`
                                    }
                                }
                            ]
                        }
                    ],
                    max_tokens: 400
                })
            });

            const data = await response.json();
            const diagnosisResult = data.choices[0].message.content;

            document.getElementById("result-box").innerText = diagnosisResult;
            
            // 🔊 정비 명장의 음성 가이드 작동
            speakCarExpertTTS(diagnosisResult);

        } catch (error) {
            console.error(error);
            document.getElementById("result-box").innerText = "차량 데이터 스캔 중 에러가 발생했습니다. API 키나 파일 형식을 확인해 주세요.";
        }
    }

    // 신뢰감을 주는 묵직한 전문가의 저음 목소리 오디오 엔진
    function speakCarExpertTTS(text) {
        if (typeof SpeechSynthesisUtterance === "undefined") return;
        window.speechSynthesis.cancel(); 

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ko-KR";
        
        utterance.rate = 0.92;  // 정보 전달력을 높이기 위해 살짝 차분한 속도
        utterance.pitch = 0.85; // 신뢰감을 주는 정비 명장의 무거운 저음 톤 변조
        
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
